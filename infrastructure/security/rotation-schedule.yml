rotation:
  database_password:
    interval_days: 30
    script: infrastructure/scripts/rotate-secrets.sh db
    notify: security@vertexchain.io

  api_keys:
    interval_days: 90
    script: infrastructure/scripts/rotate-secrets.sh api
    notify: security@vertexchain.io

  tls_certificates:
    interval_days: 60
    script: infrastructure/scripts/rotate-secrets.sh cert
    notify: security@vertexchain.io

audit:
  log_path: /var/log/vertexchain/secret-rotation.log
  retention_days: 90
