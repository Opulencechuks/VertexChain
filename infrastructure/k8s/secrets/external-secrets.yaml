apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vertexchain-vault
  namespace: vertexchain-prod
spec:
  provider:
    kubernetes:
      remoteNamespace: security-secrets
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets
  namespace: vertexchain-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vertexchain-vault
    kind: SecretStore
  target:
    name: app-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: vertexchain/database-url
    - secretKey: JWT_SECRET
      remoteRef:
        key: vertexchain/jwt-secret
    - secretKey: REDIS_URL
      remoteRef:
        key: vertexchain/redis-url
