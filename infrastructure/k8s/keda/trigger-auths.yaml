# KEDA TriggerAuthentication and ClusterTriggerAuthentication — VertexChain
# Defines authentication for external scalers: AWS, Prometheus, and database

---
# AWS SQS trigger authentication — uses IRSA (IAM Role for Service Account)
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: aws-sqs-auth
  namespace: vertexchain-prod
  labels:
    app.kubernetes.io/name: keda-trigger-auth
    app.kubernetes.io/part-of: vertexchain
spec:
  podIdentity:
    provider: aws
    roleArn: arn:aws:iam::123456789012:role/vertexchain-keda-sqs-role

---
# AWS CloudWatch trigger authentication
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: aws-cloudwatch-auth
  namespace: vertexchain-prod
  labels:
    app.kubernetes.io/name: keda-trigger-auth
    app.kubernetes.io/part-of: vertexchain
spec:
  podIdentity:
    provider: aws
    roleArn: arn:aws:iam::123456789012:role/vertexchain-keda-cw-role

---
# Prometheus trigger authentication (scrape from within cluster)
# No additional authentication required — Prometheus is internal to the cluster
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: prometheus-auth
  namespace: vertexchain-prod
  labels:
    app.kubernetes.io/name: keda-trigger-auth
    app.kubernetes.io/part-of: vertexchain
spec: {}

---
# PostgreSQL trigger authentication — connection string from secret
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: postgres-auth
  namespace: vertexchain-prod
  labels:
    app.kubernetes.io/name: keda-trigger-auth
    app.kubernetes.io/part-of: vertexchain
spec:
  secretTargetRef:
    - parameter: connection
      name: vertexchain-db-credentials
      key: connection-string

---
# RabbitMQ trigger authentication (for future message-queue scaling)
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: rabbitmq-auth
  namespace: vertexchain-prod
  labels:
    app.kubernetes.io/name: keda-trigger-auth
    app.kubernetes.io/part-of: vertexchain
spec:
  secretTargetRef:
    - parameter: host
      name: rabbitmq-credentials
      key: hostname-connection-string
