apiVersion: apps/v1
kind: Deployment
metadata:
  name: vertexchain-blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vertexchain
      version: blue
  template:
    metadata:
      labels:
        app: vertexchain
        version: blue
    spec:
      containers:
        - name: vertexchain
          image: vertexchain:blue
          ports:
            - containerPort: 3000
