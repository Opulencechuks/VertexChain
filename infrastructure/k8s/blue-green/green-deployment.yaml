apiVersion: apps/v1
kind: Deployment
metadata:
  name: vertexchain-green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vertexchain
      version: green
  template:
    metadata:
      labels:
        app: vertexchain
        version: green
    spec:
      containers:
        - name: vertexchain
          image: vertexchain:green
          ports:
            - containerPort: 3000
