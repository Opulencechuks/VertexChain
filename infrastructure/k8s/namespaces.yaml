apiVersion: v1
kind: Namespace
metadata:
  name: vertexchain-dev
---
apiVersion: v1
kind: Namespace
metadata:
  name: vertexchain-staging
---
apiVersion: v1
kind: Namespace
metadata:
  name: vertexchain-prod
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: app-quota
  namespace: vertexchain-dev
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    pods: "50"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: app-quota
  namespace: vertexchain-staging
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    pods: "100"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: app-quota
  namespace: vertexchain-prod
spec:
  hard:
    requests.cpu: "16"
    requests.memory: 32Gi
    limits.cpu: "32"
    limits.memory: 64Gi
    pods: "200"
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: vertexchain-prod
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-nginx
  namespace: vertexchain-prod
spec:
  podSelector: {}
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
  policyTypes:
    - Ingress
