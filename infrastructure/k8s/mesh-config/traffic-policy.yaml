apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: vertexchain-backend
  namespace: vertexchain
spec:
  host: backend-service
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        h2UpgradePolicy: UPGRADE
        http1MaxPendingRequests: 50
        http2MaxRequests: 100
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
    retryPolicy:
      attempts: 3
      perTryTimeout: 5s
      retryOn: "5xx,reset,connect-failure,retriable-4xx"
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: vertexchain-backend
  namespace: vertexchain
spec:
  hosts:
    - backend-service
  http:
    - timeout: 10s
      retries:
        attempts: 3
        perTryTimeout: 3s
        retryOn: "5xx,reset"
      route:
        - destination:
            host: backend-service
            port:
              number: 3000
