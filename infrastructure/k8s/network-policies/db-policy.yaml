apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: db-isolation-policy
  namespace: vertexchain-prod
spec:
  podSelector:
    matchLabels:
      app: postgres
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: vertexchain-backend
      ports:
        - protocol: TCP
          port: 5432
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: vertexchain-backend
      ports:
        - protocol: TCP
          port: 10250
  policyTypes:
    - Ingress
    - Egress
